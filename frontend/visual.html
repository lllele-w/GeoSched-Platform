<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoSched 智策平台 · 可视化监控</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">

  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-globe-americas"></i></div>
      <div class="logo-text"><div class="logo-name">GeoSched</div><div class="logo-sub">智策平台</div></div>
    </a>
    <nav class="nav-menu">
      <a href="index.html"    class="nav-item"><i class="bi bi-grid-fill nav-icon"></i><span>首页总览</span></a>
      <a href="data.html"     class="nav-item"><i class="bi bi-database-fill nav-icon"></i><span>数据管理</span></a>
      <a href="schedule.html" class="nav-item"><i class="bi bi-cpu-fill nav-icon"></i><span>智能调度</span></a>
      <a href="analysis.html" class="nav-item"><i class="bi bi-bar-chart-fill nav-icon"></i><span>结果分析</span></a>
      <a href="visual.html"   class="nav-item active"><i class="bi bi-display-fill nav-icon"></i><span>可视化监控</span></a>
      <a href="about.html"    class="nav-item"><i class="bi bi-info-circle-fill nav-icon"></i><span>系统说明</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-image-widget">
        <img src="input/1.jpg" class="siw-img active" alt="">
        <img src="input/2.jpg" class="siw-img" alt="">
        <img src="input/3.jpg" class="siw-img" alt="">
        <div class="siw-top-fade"></div>
        <div class="siw-overlay"></div>
        <div class="siw-caption">数字地球 · 全球网络</div>
        <div class="siw-dots">
          <span class="siw-dot active"></span>
          <span class="siw-dot"></span>
          <span class="siw-dot"></span>
        </div>
      </div>
      <div class="siw-meta">GeoSched v1.0 &nbsp;·&nbsp; 2025</div>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="top-header">
      <div class="header-left">
        <div class="page-title">可视化监控</div>
        <div class="page-subtitle">任务时序动态展示与实时甘特图</div>
      </div>
      <div class="header-right">
        <select style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-1);padding:5px 10px;border-radius:7px;font-size:12px;font-family:inherit;outline:none" id="scene-select" onchange="rebuildGantt()">
          <option value="all">全部方案</option>
          <option value="proposed">Proposed 方案</option>
          <option value="nsga3">NSGA-III 方案</option>
        </select>
        <button class="header-btn badge-dot"><i class="bi bi-bell"></i></button>
        <div class="user-info">
          <div class="user-avatar"><i class="bi bi-person"></i></div>
          <span class="user-name">管理员</span>
        </div>
      </div>
    </header>

    <main class="content-area" style="display:flex;flex-direction:column;padding:16px 20px;gap:14px">

      <!-- KPI 行 -->
      <div class="kpi-row" style="margin-bottom:0">
        <div class="kpi-card blue">
          <div class="kpi-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="kpi-body">
            <div class="kpi-label">已完成任务</div>
            <div class="kpi-value"><span id="kv-done">0</span></div>
            <div class="kpi-trend"><span class="trend-up" id="kv-done-pct">--</span>&nbsp;完成率</div>
          </div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-icon"><i class="bi bi-lightning-charge-fill"></i></div>
          <div class="kpi-body">
            <div class="kpi-label">进行中任务</div>
            <div class="kpi-value"><span id="kv-running">0</span></div>
            <div class="kpi-trend"><span style="color:var(--text-3)" id="kv-running-pct">--</span>&nbsp;执行率</div>
          </div>
        </div>
        <div class="kpi-card orange">
          <div class="kpi-icon"><i class="bi bi-clock"></i></div>
          <div class="kpi-body">
            <div class="kpi-label">待执行任务</div>
            <div class="kpi-value"><span id="kv-pending">0</span></div>
            <div class="kpi-trend"><span style="color:var(--text-3)" id="kv-pending-pct">--</span>&nbsp;待执行率</div>
          </div>
        </div>
        <div class="kpi-card purple">
          <div class="kpi-icon"><i class="bi bi-currency-yen"></i></div>
          <div class="kpi-body">
            <div class="kpi-label">当前累计收益</div>
            <div class="kpi-value"><span id="kv-revenue">0</span><span>万元</span></div>
            <div class="kpi-trend"><span class="trend-up" id="kv-time">--</span></div>
          </div>
        </div>
      </div>

      <!-- 甘特图主体 -->
      <div class="chart-card no-lift" style="flex:1;min-height:0;display:flex;flex-direction:column">
        <div class="card-header-row mb-2">
          <div>
            <div class="card-title">任务执行甘特图</div>
            <div class="card-subtitle">各卫星资源 · 任务时序分配</div>
          </div>
          <div class="card-actions">
            <span class="tag-btn active" id="filter-all"    onclick="filterGantt('all',this)">全部</span>
            <span class="tag-btn" id="filter-done"   onclick="filterGantt('done',this)">已完成</span>
            <span class="tag-btn" id="filter-running" onclick="filterGantt('running',this)">进行中</span>
            <span class="tag-btn" id="filter-pending" onclick="filterGantt('pending',this)">待执行</span>
          </div>
        </div>
        <div id="gantt-main" style="flex:1;min-height:300px"></div>
      </div>

      <!-- 播放控制条 -->
      <div class="gantt-controls">
        <button class="ctrl-btn" id="btn-prev"  onclick="stepTime(-1)" title="后退"><i class="bi bi-skip-backward-fill"></i></button>
        <button class="ctrl-btn playing" id="btn-play" onclick="togglePlay()" title="播放/暂停"><i class="bi bi-pause-fill" id="play-icon"></i></button>
        <button class="ctrl-btn" id="btn-next"  onclick="stepTime(1)"  title="前进"><i class="bi bi-skip-forward-fill"></i></button>
        <button class="ctrl-btn" id="btn-stop"  onclick="stopPlay()"   title="停止"><i class="bi bi-stop-fill"></i></button>
        <div class="ctrl-sep"></div>
        <div class="time-display" id="time-display">05-12 08:00</div>
        <div style="flex:1; background:rgba(255,255,255,0.06); border-radius:3px; height:6px; cursor:pointer; position:relative" id="timeline-bar" onclick="seekTimeline(event)">
          <div id="timeline-fill" style="height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:3px;width:0%;transition:width 0.3s"></div>
          <div id="timeline-thumb" style="position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid rgba(255,255,255,0.3);left:0%;transform:translateX(-50%);cursor:pointer;transition:left 0.3s"></div>
        </div>
        <div class="ctrl-sep"></div>
        <div class="speed-label">速度：</div>
        <div class="speed-btns">
          <button class="speed-btn" onclick="setSpeed(0.5,this)">0.5x</button>
          <button class="speed-btn active" onclick="setSpeed(1,this)">1x</button>
          <button class="speed-btn" onclick="setSpeed(2,this)">2x</button>
          <button class="speed-btn" onclick="setSpeed(4,this)">4x</button>
        </div>
      </div>

      <!-- 资源利用率实时图 -->
      <div class="row-flex" style="height:180px;margin-bottom:0">
        <div class="chart-card no-lift" style="flex:3">
          <div class="card-title mb-2">实时资源利用率</div>
          <div id="realtime-chart" style="height:140px"></div>
        </div>
        <div class="chart-card no-lift" style="flex:2">
          <div class="card-title mb-2">当前时刻任务状态分布</div>
          <div id="status-pie" style="height:140px"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="js/common.js"></script>
<script>
const API_BASE = 'http://localhost:8000';

// ── 静态 fallback 数据（后端未启动时使用）──
let RESOURCES = ['资源E','资源D','资源C','资源B','资源A'];
const STATUS_COLORS = { done:'#22c55e', running:'#1677ff', pending:'#f59e0b', waiting:'#94a3b8', error:'#ef4444' };
const STATUS_LABELS = { done:'已完成', running:'进行中', pending:'待执行', waiting:'等待中', error:'异常' };

let ALL_TASKS = [
  [4,'2025-05-12 08:00','2025-05-12 18:00','done'],   [4,'2025-05-12 20:00','2025-05-13 06:00','done'],
  [4,'2025-05-13 10:00','2025-05-13 22:00','done'],   [4,'2025-05-15 06:00','2025-05-15 20:00','done'],
  [4,'2025-05-17 08:00','2025-05-17 18:00','running'],[4,'2025-05-18 08:00','2025-05-18 18:00','pending'],
  [3,'2025-05-12 06:00','2025-05-12 20:00','done'],   [3,'2025-05-13 08:00','2025-05-13 16:00','done'],
  [3,'2025-05-14 10:00','2025-05-14 22:00','done'],   [3,'2025-05-16 10:00','2025-05-16 22:00','running'],
  [3,'2025-05-17 06:00','2025-05-17 22:00','running'],[3,'2025-05-18 10:00','2025-05-18 22:00','pending'],
  [2,'2025-05-12 08:00','2025-05-12 22:00','done'],   [2,'2025-05-14 07:00','2025-05-14 20:00','done'],
  [2,'2025-05-16 06:00','2025-05-16 20:00','done'],   [2,'2025-05-17 08:00','2025-05-17 18:00','running'],
  [2,'2025-05-18 08:00','2025-05-18 18:00','pending'],
  [1,'2025-05-12 10:00','2025-05-12 22:00','done'],   [1,'2025-05-14 06:00','2025-05-14 18:00','done'],
  [1,'2025-05-15 08:00','2025-05-15 20:00','error'],  [1,'2025-05-16 08:00','2025-05-16 20:00','done'],
  [1,'2025-05-18 06:00','2025-05-18 20:00','waiting'],
  [0,'2025-05-13 08:00','2025-05-13 20:00','done'],   [0,'2025-05-15 06:00','2025-05-15 18:00','done'],
  [0,'2025-05-16 10:00','2025-05-16 22:00','done'],   [0,'2025-05-17 10:00','2025-05-17 20:00','running'],
  [0,'2025-05-18 08:00','2025-05-18 20:00','pending'],
];

// 甘特时间范围（可被 API 覆盖）
let ganttTimeStart = '2025-05-12';
let ganttTimeEnd   = '2025-05-19';

// 统计 KPI 展示
function applyStats(st, revenue) {
  const total = Object.values(st).reduce((a,b)=>a+b,0) || 1;
  document.getElementById('kv-done').textContent      = st.done.toString();
  document.getElementById('kv-done-pct').textContent  = Math.round(st.done/total*100)+'%';
  document.getElementById('kv-running').textContent   = st.running.toString();
  document.getElementById('kv-running-pct').textContent = Math.round(st.running/total*100)+'%';
  document.getElementById('kv-pending').textContent   = st.pending.toString();
  document.getElementById('kv-pending-pct').textContent = Math.round(st.pending/total*100)+'%';
  document.getElementById('kv-revenue').textContent   = revenue || '8,732';
}

const _initStats = { done:0,running:0,pending:0,waiting:0,error:0 };
ALL_TASKS.forEach(t=>_initStats[t[3]]++);
applyStats(_initStats, '8,732');

// 甘特图
let ganttInstance = null;
let filterMode = 'all';

function buildGanttData(filter) {
  return ALL_TASKS
    .filter(t => filter === 'all' || t[3] === filter)
    .map(t => ({
      value: [t[0], +new Date(t[1]), +new Date(t[2]), t[3]],
      itemStyle: { color: STATUS_COLORS[t[3]], borderRadius: 3 }
    }));
}

function renderGantt(filter) {
  if (!ganttInstance) {
    ganttInstance = regChart(echarts.init(document.getElementById('gantt-main')));
  }
  const data = buildGanttData(filter);
  ganttInstance.setOption({
    backgroundColor:'transparent',
    tooltip:{ ...TOOLTIP_STYLE,
      formatter:p=>{ const v=p.value; const f=t=>new Date(t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<b>${RESOURCES[v[0]]}</b><br/>状态：${STATUS_LABELS[v[3]]}<br/>开始：${f(v[1])}<br/>结束：${f(v[2])}`; }
    },
    legend:{ data:Object.values(STATUS_LABELS), bottom:4, textStyle:{color:'rgba(190,215,255,0.55)',fontSize:10}, itemWidth:12, itemHeight:7 },
    dataZoom:[
      { type:'inside', xAxisIndex:0, filterMode:'weakFilter', moveOnMouseMove:true },
      { type:'slider', xAxisIndex:0, bottom:28, height:18,
        borderColor:'rgba(50,130,240,0.2)', backgroundColor:'rgba(0,0,0,0.2)',
        fillerColor:'rgba(22,119,255,0.15)', handleStyle:{color:'#1677ff'},
        textStyle:{color:'rgba(190,215,255,0.5)',fontSize:9}
      }
    ],
    grid:{ top:6, bottom:70, left:62, right:18 },
    xAxis:{ type:'time', min:ganttTimeStart, max:ganttTimeEnd,
      axisLabel:{ color:'rgba(190,215,255,0.55)', fontSize:10,
        formatter:v=>{ const d=new Date(v); return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      },
      axisLine:{lineStyle:{color:'rgba(50,130,240,0.2)'}}, splitLine:{lineStyle:{color:'rgba(50,130,240,0.1)',type:'dashed'}}
    },
    yAxis:{ data:RESOURCES, axisLabel:{color:'rgba(190,215,255,0.55)',fontSize:11},
      axisLine:{lineStyle:{color:'rgba(50,130,240,0.2)'}}, splitLine:{show:false} },
    series:[{
      type:'custom', name:'任务',
      renderItem(params,api){
        const ci=api.value(0); const s=api.coord([api.value(1),ci]); const e=api.coord([api.value(2),ci]);
        const h=api.size([0,1])[1]*0.54;
        const shape=echarts.graphic.clipRectByRect({x:s[0],y:s[1]-h/2,width:e[0]-s[0],height:h},
          {x:params.coordSys.x,y:params.coordSys.y,width:params.coordSys.width,height:params.coordSys.height});
        return shape&&{type:'rect',transition:['shape'],shape,style:api.style()};
      },
      encode:{x:[1,2],y:0}, data
    }]
  });
}

function filterGantt(mode, el) {
  filterMode = mode;
  document.querySelectorAll('[id^=filter-]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGantt(mode);
}

function rebuildGantt() { renderGantt(filterMode); }

// ── 从后端获取甘特数据 ──
async function fetchGanttData() {
  try {
    const res = await fetch(API_BASE + '/result');
    if (!res.ok) return;
    const json = await res.json();
    if (json.status !== 'ok' || !json.data.gantt) return;
    const g = json.data.gantt;
    // 更新资源列表（逆序，因为 ECharts y轴是从下到上）
    RESOURCES = [...g.resources].reverse();
    ALL_TASKS = g.tasks;
    ganttTimeStart = g.time_start;
    ganttTimeEnd   = g.time_end;
    // 重新计算统计
    applyStats(g.stats, g.revenue);
    // 重渲染甘特图（先销毁之前实例以更新 yAxis）
    if (ganttInstance) { ganttInstance.dispose(); ganttInstance = null; }
    renderGantt(filterMode);
    // 更新状态饼图
    if (statusPie) {
      statusPie.setOption({ series:[{ data:[
        {value:g.stats.done,    name:'已完成', itemStyle:{color:'#22c55e'}},
        {value:g.stats.running, name:'进行中', itemStyle:{color:'#1677ff'}},
        {value:g.stats.pending, name:'待执行', itemStyle:{color:'#f59e0b'}},
        {value:g.stats.waiting, name:'等待中', itemStyle:{color:'#94a3b8'}},
        {value:g.stats.error,   name:'异常',   itemStyle:{color:'#ef4444'}},
      ]}] });
    }
  } catch(e) { /* 后端未启动，使用静态数据 */ }
}

// 时间轴播放
let playInterval  = null;
let timeProgress  = 0; // 0~100
let playSpeed     = 1;
let isPlaying     = true;

const START_MS = +new Date('2025-05-12 00:00');
const END_MS   = +new Date('2025-05-19 00:00');

function updateTimeDisplay(pct) {
  const ms = START_MS + (END_MS - START_MS) * (pct / 100);
  const d  = new Date(ms);
  const fmt = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  document.getElementById('time-display').textContent = fmt;
  document.getElementById('timeline-fill').style.width = pct+'%';
  document.getElementById('timeline-thumb').style.left = pct+'%';
}

function startPlayInterval() {
  playInterval = setInterval(()=>{
    timeProgress = Math.min(timeProgress + 0.4 * playSpeed, 100);
    updateTimeDisplay(timeProgress);
    if (timeProgress >= 100) { stopPlay(); }
  }, 100);
}

function togglePlay() {
  isPlaying = !isPlaying;
  const icon = document.getElementById('play-icon');
  const btn  = document.getElementById('btn-play');
  if (isPlaying) {
    icon.className = 'bi bi-pause-fill';
    btn.classList.add('playing');
    startPlayInterval();
  } else {
    icon.className = 'bi bi-play-fill';
    btn.classList.remove('playing');
    clearInterval(playInterval);
  }
}

function stopPlay() {
  isPlaying = false;
  clearInterval(playInterval);
  document.getElementById('play-icon').className = 'bi bi-play-fill';
  document.getElementById('btn-play').classList.remove('playing');
}

function stepTime(dir) {
  timeProgress = Math.max(0, Math.min(100, timeProgress + dir * 5));
  updateTimeDisplay(timeProgress);
}

function seekTimeline(e) {
  const bar = document.getElementById('timeline-bar');
  const rect = bar.getBoundingClientRect();
  timeProgress = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  updateTimeDisplay(timeProgress);
}

function setSpeed(s, el) {
  playSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// 初始化播放
startPlayInterval();
updateTimeDisplay(0);

// ── 资源利用率实时图 ──
const realtimeChart = regChart(echarts.init(document.getElementById('realtime-chart')));
const realtimeData = { 'SAT-001':[], 'SAT-002':[], 'SAT-003':[], 'SAT-004':[], 'SAT-005':[] };
const rtColors = { 'SAT-001':'#1677ff','SAT-002':'#22c55e','SAT-003':'#f59e0b','SAT-004':'#06b6d4','SAT-005':'#ef4444' };
const xLabels = Array.from({length:20},(_,i)=>`-${19-i}s`);
let rtBase = { 'SAT-001':82,'SAT-002':65,'SAT-003':54,'SAT-004':88,'SAT-005':32 };
Object.keys(realtimeData).forEach(k=>{ for(let i=0;i<20;i++) realtimeData[k].push(rtBase[k]+(Math.random()-.5)*6); });

realtimeChart.setOption({
  backgroundColor:'transparent',
  tooltip:{ trigger:'axis', ...TOOLTIP_STYLE },
  legend:{ data:Object.keys(rtColors), top:0, right:0, textStyle:{color:'rgba(190,215,255,0.55)',fontSize:9}, itemWidth:12, itemHeight:6 },
  grid:{ top:22, bottom:22, left:36, right:10 },
  xAxis:{ type:'category', data:xLabels, axisLabel:{color:'rgba(190,215,255,0.4)',fontSize:9}, axisLine:{lineStyle:{color:'rgba(50,130,240,0.15)'}}, splitLine:{show:false} },
  yAxis:{ type:'value', min:0, max:100,
    axisLabel:{color:'rgba(190,215,255,0.55)',fontSize:9,formatter:'{value}%'}, axisLine:{show:false}, splitLine:{lineStyle:{color:'rgba(50,130,240,0.08)',type:'dashed'}} },
  series: Object.entries(rtColors).map(([name,color])=>({
    name, type:'line', smooth:true, data:realtimeData[name],
    lineStyle:{color,width:1.5}, itemStyle:{color}, symbol:'none',
    areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:color.replace('#','rgba(').replace(/^rgba\((.+)\)$/,'rgba($1,0.15)')},{offset:1,color:'rgba(0,0,0,0)'}])}
  }))
});

// 实时更新资源利用率
setInterval(()=>{
  Object.keys(realtimeData).forEach(k=>{
    realtimeData[k].shift();
    realtimeData[k].push(Math.max(10, Math.min(100, realtimeData[k][realtimeData[k].length-1]+(Math.random()-.5)*4)));
  });
  realtimeChart.setOption({ series: Object.keys(rtColors).map((name,i)=>({ data:realtimeData[name] })) });
}, 1200);

// ── 状态饼图 ──
let statusPie = regChart(echarts.init(document.getElementById('status-pie')));
statusPie.setOption({
  backgroundColor:'transparent',
  tooltip:{ ...TOOLTIP_STYLE },
  legend:{ orient:'vertical', right:0, top:'center', textStyle:{color:'rgba(190,215,255,0.55)',fontSize:10} },
  series:[{
    type:'pie', radius:['38%','65%'], center:['36%','50%'],
    data:[
      {value:_initStats.done,    name:'已完成', itemStyle:{color:'#22c55e'}},
      {value:_initStats.running, name:'进行中', itemStyle:{color:'#1677ff'}},
      {value:_initStats.pending, name:'待执行', itemStyle:{color:'#f59e0b'}},
      {value:_initStats.waiting, name:'等待中', itemStyle:{color:'#94a3b8'}},
      {value:_initStats.error,   name:'异常',   itemStyle:{color:'#ef4444'}},
    ],
    label:{ show:false },
    itemStyle:{ borderColor:'rgba(0,0,0,0)', borderWidth:2 }
  }]
});

// 初始化甘特图 + 从后端加载数据
window.addEventListener('load', ()=>{ renderGantt('all'); fetchGanttData(); });
</script>
</body>
</html>
